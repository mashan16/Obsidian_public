services:
  quartz:
    image: ghcr.io/jackyzha0/quartz:latest
    container_name: quartz-notes
    ports:
      - "80:8080"
    volumes:
      - ./content:/usr/src/app/content
      - /opt/quartz/quartz.config.ts:/usr/src/app/quartz.config.ts
      - /opt/quartz/quartz.layout.ts:/usr/src/app/quartz.layout.ts
      - /opt/quartz/cfg.ts:/usr/src/app/quartz/cfg.ts
      - /opt/quartz/plugins:/usr/src/app/plugins
    command: ["npx", "quartz", "build", "--serve", "--watch"]
    restart: unless-stopped